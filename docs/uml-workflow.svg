<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" style="background: #0f172a; font-family: 'Inter', system-ui, sans-serif;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="500" y="30" fill="#f0f4f8" font-size="18" font-weight="800" text-anchor="middle">Dynamic Sequence Workflow: Asynchronous Hub-and-Spoke Synthesis</text>

  <!-- Lifelines -->
  <line x1="100" y1="70" x2="100" y2="480" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="320" y1="70" x2="320" y2="480" stroke="#00f2fe" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="580" y1="70" x2="580" y2="480" stroke="#4facfe" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="860" y1="70" x2="860" y2="480" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Headers -->
  <rect x="30" y="40" width="140" height="35" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="100" y="63" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">User / Client</text>

  <rect x="240" y="40" width="160" height="35" rx="8" fill="#0f172a" stroke="#00f2fe" stroke-width="2" filter="url(#glow)"/>
  <text x="320" y="63" fill="#00f2fe" font-size="13" font-weight="bold" text-anchor="middle">CoordinatorAgent</text>

  <rect x="490" y="40" width="180" height="35" rx="8" fill="#0f172a" stroke="#4facfe" stroke-width="2"/>
  <text x="580" y="63" fill="#4facfe" font-size="13" font-weight="bold" text-anchor="middle">Web &amp; Doc Subagents</text>

  <rect x="770" y="40" width="180" height="35" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="860" y="63" fill="#10b981" font-size="13" font-weight="bold" text-anchor="middle">SynthesisSubagent</text>

  <!-- Sequence Steps -->
  <!-- 1. Query -->
  <line x1="100" y1="110" x2="320" y2="110" stroke="#fff" stroke-width="2"/>
  <polygon points="315,105 325,110 315,115" fill="#fff"/>
  <text x="210" y="100" fill="#fff" font-size="13" text-anchor="middle">1. submitQuery(topic)</text>

  <!-- 2. Delegate -->
  <line x1="320" y1="150" x2="580" y2="150" stroke="#00f2fe" stroke-width="2"/>
  <polygon points="575,145 585,150 575,155" fill="#00f2fe"/>
  <text x="450" y="140" fill="#00f2fe" font-size="13" text-anchor="middle">2. process(query) [Parallel]</text>

  <!-- 3. Retry loop box -->
  <rect x="510" y="180" width="140" height="70" rx="8" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-dasharray="4,4"/>
  <text x="580" y="205" fill="#f59e0b" font-size="12" font-weight="bold" text-anchor="middle">[Transient Error]</text>
  <text x="580" y="225" fill="#f59e0b" font-size="11" text-anchor="middle">Local Backoff Retry Loop</text>
  <path d="M 650 200 C 680 200, 680 230, 650 230" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="655,225 645,230 655,235" fill="#f59e0b"/>

  <!-- 4. Return findings -->
  <line x1="580" y1="290" x2="320" y2="290" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="325,285 315,290 325,295" fill="#4facfe"/>
  <text x="450" y="280" fill="#4facfe" font-size="13" text-anchor="middle">3. Result.ok(finding) [Recovered]</text>

  <!-- 5. Route to synthesis -->
  <line x1="320" y1="340" x2="860" y2="340" stroke="#10b981" stroke-width="3"/>
  <polygon points="850,335 860,340 850,345" fill="#10b981"/>
  <text x="590" y="330" fill="#10b981" font-size="14" font-weight="bold" text-anchor="middle">4. routeToSynthesis(findings) [THE ANSWER]</text>

  <!-- 6. Synthesis computation -->
  <rect x="780" y="370" width="160" height="50" rx="6" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981"/>
  <text x="860" y="395" fill="#10b981" font-size="12" font-weight="bold" text-anchor="middle">Reconcile &amp; Merge Data</text>
  <text x="860" y="410" fill="#cbd5e1" font-size="11" text-anchor="middle">(Remove 0% Redundancy)</text>

  <!-- 7. Return final report -->
  <line x1="860" y1="450" x2="100" y2="450" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="110,445 100,450 110,455" fill="#10b981"/>
  <text x="480" y="440" fill="#10b981" font-size="14" font-weight="bold" text-anchor="middle">5. Return Unified SynthesisReport (Quality Score: 100/100)</text>
</svg>
